<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>小红书采集</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>小红书采集 <span>v2.4.0</span></h1>
        <p id="folder">未选择收件箱</p>
      </header>
      <button id="choose">选择 Obsidian 收件箱文件夹</button>
      <button id="huaban">采集花瓣主图</button>
      <button id="collect">采集当前页可见图片</button>
      <button id="runPending">执行右键采集</button>
      <button id="pending">保存右键图片</button>
      <p id="status">先点上面的按钮，然后在弹出的文件夹选择窗口里选“浏览器采集收件箱”。</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
